<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var errDiv = document.createElement('div');
        errDiv.style.color = 'red';
        errDiv.style.padding = '20px';
        errDiv.style.backgroundColor = '#fee';
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0'; errDiv.style.left = '0'; errDiv.style.right = '0'; errDiv.style.zIndex = '9999';
        errDiv.innerText = 'Error: ' + message + '\n' + (error ? error.stack : '');
        document.body.appendChild(errDiv);
      };
      window.addEventListener("unhandledrejection", function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.color = 'red';
        errDiv.style.padding = '20px';
        errDiv.style.backgroundColor = '#eff';
        errDiv.style.position = 'fixed';
        errDiv.style.top = '100px'; errDiv.style.left = '0'; errDiv.style.right = '0'; errDiv.style.zIndex = '9999';
        errDiv.innerText = 'Unhandled Rejection: ' + event.reason;
        document.body.appendChild(errDiv);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
